<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Before / After Slider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Image comparison tool</p>
          <h1>Upload two images and compare them with a before / after slider.</h1>
          <p class="lede">
            Drop in a pair of images, then drag the handle to reveal the one on top.
          </p>
        </div>
      </section>

      <section class="controls" aria-label="image uploads">
        <label class="file-input">
          <span>Before image</span>
          <input id="beforeInput" type="file" accept="image/*" />
        </label>
        <label class="file-input">
          <span>After image</span>
          <input id="afterInput" type="file" accept="image/*" />
        </label>
      </section>

      <section class="viewer">
        <div class="frame" id="frame">
          <div class="image-layer base">
            <img id="beforeImage" alt="Before image" />
          </div>
          <div class="image-layer overlay" id="overlay">
            <img id="afterImage" alt="After image" />
          </div>
          <div class="labels">
            <span>Before</span>
            <span>After</span>
          </div>
          <div class="handle" id="handle" aria-hidden="true">
            <div class="line"></div>
            <button class="knob" id="sliderThumb" type="button" aria-label="Drag to compare images"></button>
          </div>
          <input
            id="slider"
            class="range"
            type="range"
            min="0"
            max="100"
            value="50"
            aria-label="Comparison slider"
          />
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
